name: fund-ranking-system

services:
  fund-ranking-system:
    build: .
    container_name: fund-ranking-system
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      FUND_RANKING_HOST: 0.0.0.0
      FUND_RANKING_PORT: 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
