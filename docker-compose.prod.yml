name: fund-ranking-system-prod

services:
  app:
    build: .
    container_name: fund-ranking-app
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    env_file:
      - .env.production
    environment:
      TZ: Asia/Shanghai
      FUND_RANKING_HOST: 0.0.0.0
      FUND_RANKING_PORT: 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: fund-ranking-nginx
    depends_on:
      app:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/runtime/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/secrets/.htpasswd:/etc/nginx/.htpasswd:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
